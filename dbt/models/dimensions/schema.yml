models:
  - name: dim_vendor
    columns:
      - name: vendor_id
        tests: [unique, not_null]
      - name: vendor_name
        tests: [not_null]
  - name: dim_payment_type
    columns:
      - name: payment_type_id
        tests: [unique, not_null]
  - name: dim_rate_code
    columns:
      - name: rate_code_id
        tests: [unique, not_null]
      - name: rate_description
        tests: [not_null]
  - name: dim_zone
    columns:
      - name: zone_id
        tests: [unique, not_null]
      - name: borough
        tests:
          - accepted_values:
              values:
                [
                  Bronx,
                  Brooklyn,
                  EWR,
                  Manhattan,
                  Queens,
                  Staten Island,
                  Unknown,
                  N/A,
                ]
      - name: zone_name
        tests: [not_null]
